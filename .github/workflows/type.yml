name: Type check

on:
  workflow_call:

permissions:
  contents: read

jobs:
  ty:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Sync development dependencies
        run: uv sync --dev

      - name: Run ty
        run: uv run ty check
